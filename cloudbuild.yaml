steps:
  # 1. Instalar dependencias de Node
  - name: 'node:20-alpine'
    entrypoint: npm
    args: ['ci', '--prefer-offline']

  # 2. Build de producción Angular
  - name: 'node:20-alpine'
    entrypoint: npm
    args: ['run', 'build', '--', '--configuration=production']

  # 3. Build de la imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-central1-docker.pkg.dev/my-project-challenge-497400/portal-images/challenge-frontend-latam:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/my-project-challenge-497400/portal-images/challenge-frontend-latam:latest'
      - '.'

  # 4. Push de ambas etiquetas al Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/my-project-challenge-497400/portal-images/challenge-frontend-latam'

  # 5. Deploy a Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - challenge-frontend-latam
      - '--image=us-central1-docker.pkg.dev/my-project-challenge-497400/portal-images/challenge-frontend-latam:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'

images:
  - 'us-central1-docker.pkg.dev/my-project-challenge-497400/portal-images/challenge-frontend-latam:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/my-project-challenge-497400/portal-images/challenge-frontend-latam:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
